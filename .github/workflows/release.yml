name: Release

# Manual runs only. Pushes never trigger a build; start a release with `pnpm release`.
on:
  workflow_dispatch:

# Least privilege by default; only the publish job is granted contents: write.
permissions:
  contents: read

# Serialize releases instead of cancelling: a second run queues behind the first rather
# than aborting it. Cancelling a run mid-publish could bump the version yet leave no
# GitHub Release for it.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      # Keep the other platform going so one failure still tells us about both.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: mac
          - platform: windows-latest
            artifact: win
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pinned to a commit SHA: this action runs in the same job that decrypts the
      # Apple .p12, so a hijacked tag could reach the signing material. The pnpm
      # version comes from package.json's `packageManager` field — passing `version:`
      # here as well makes the action throw on a version mismatch.
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax check
        run: pnpm check

      # electron-builder imports CSC_LINK into a throwaway keychain by itself, so there
      # is no hand-written `security import` step. Notarization is not switched on by a
      # config flag: it runs whenever APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
      # APPLE_TEAM_ID are present and the app was signed. Note that the repository
      # secret is named APPLE_PASSWORD while the env var must be
      # APPLE_APP_SPECIFIC_PASSWORD.
      - name: Build (macOS, Developer ID signed + notarized)
        if: matrix.platform == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # package.json pins `mac.identity: null` so local builds stay unsigned. CI
          # overrides it here. electron-builder picks the certificate type itself and
          # rejects a name that still carries the "Developer ID Application: " prefix,
          # so strip it (a no-op if the secret is stored without the prefix).
          IDENTITY="${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          pnpm run tw:build
          # forceCodeSigning turns a missing/incorrect certificate into a failed build
          # instead of a silently unsigned dmg.
          pnpm exec electron-builder --publish never \
            -c.mac.identity="$IDENTITY" \
            -c.forceCodeSigning=true

      # Windows is unsigned; SmartScreen warns on first run (documented in the README).
      # shell: bash forces `bash -eo pipefail` instead of the default pwsh, where a
      # failing `pnpm run tw:build` would not stop the step and could ship an installer
      # without the generated app.css.
      - name: Build (Windows, unsigned)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          pnpm run tw:build
          pnpm exec electron-builder --publish never

      # Hand the binaries to the publish job instead of letting each matrix leg push to
      # GitHub. Two legs publishing the same tag race each other, and a half-uploaded
      # release is worse than none: this way the release is created exactly once, only
      # after both platforms succeeded.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Create as a draft so the release only becomes visible once every asset has
          # finished uploading. --target pins the tag to the commit this run built.
          gh release create "v${VERSION}" \
            --target "${{ github.sha }}" \
            --title "Side by Side Browser v${VERSION}" \
            --generate-notes \
            --draft \
            artifacts/*
          gh release edit "v${VERSION}" --draft=false --latest
